<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clipboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E9ECEF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F1F3F4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- App icon background (rounded rectangle) -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#backgroundGradient)" stroke="#2C5282" stroke-width="4"/>
  
  <!-- Clipboard base -->
  <rect x="140" y="80" width="232" height="320" rx="16" ry="16" fill="url(#clipboardGradient)" stroke="#6C757D" stroke-width="3"/>
  
  <!-- Clipboard clip at top -->
  <rect x="216" y="60" width="80" height="40" rx="8" ry="8" fill="#6C757D"/>
  <rect x="226" y="70" width="60" height="20" rx="4" ry="4" fill="url(#clipboardGradient)"/>
  
  <!-- Paper/document -->
  <rect x="170" y="130" width="172" height="240" rx="8" ry="8" fill="url(#paperGradient)" stroke="#DEE2E6" stroke-width="2"/>
  
  <!-- Text lines on paper -->
  <rect x="190" y="160" width="120" height="8" rx="4" fill="#4A90E2"/>
  <rect x="190" y="180" width="132" height="6" rx="3" fill="#6C757D"/>
  <rect x="190" y="195" width="100" height="6" rx="3" fill="#6C757D"/>
  <rect x="190" y="210" width="140" height="6" rx="3" fill="#6C757D"/>
  
  <!-- Stack indicator (multiple papers) -->
  <rect x="175" y="135" width="172" height="240" rx="8" ry="8" fill="none" stroke="#CED4DA" stroke-width="1" opacity="0.7"/>
  <rect x="180" y="140" width="172" height="240" rx="8" ry="8" fill="none" stroke="#CED4DA" stroke-width="1" opacity="0.4"/>
  
  <!-- Heart icon for favorites -->
  <path d="M280 250 C280 240, 290 235, 300 240 C310 235, 320 240, 320 250 C320 265, 300 280, 300 280 C300 280, 280 265, 280 250 Z" fill="#E74C3C"/>
  
  <!-- Small clipboard icon in corner -->
  <rect x="380" y="320" width="40" height="50" rx="4" fill="#4A90E2" opacity="0.8"/>
  <rect x="395" y="315" width="10" height="8" rx="2" fill="#6C757D"/>
  <rect x="385" y="330" width="30" height="2" rx="1" fill="white"/>
  <rect x="385" y="335" width="25" height="2" rx="1" fill="white"/>
  <rect x="385" y="340" width="28" height="2" rx="1" fill="white"/>
</svg> 